    <polygon points="8,16 24,8 40,16 24,24" fill="#a98fe0"/>
    <polygon points="8,16 24,24 24,44 8,36" fill="#6f42c1"/>
    <polygon points="40,16 24,24 24,44 40,36" fill="#8a63d2"/>
  </g>
  <!-- Export arrow pointing out to the file -->
