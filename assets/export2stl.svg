<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Isometric cube representing the solid being exported -->
  <g fill="none" stroke="#b3651e" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="8,16 24,8 40,16 24,24" fill="#f0a35a"/>
    <polygon points="8,16 24,24 24,44 8,36" fill="#b3651e"/>
    <polygon points="40,16 24,24 24,44 40,36" fill="#d98030"/>
  </g>
  <!-- Export arrow pointing out to the file -->
  <g fill="#00ae42" stroke="#00ae42" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <line x1="30" y1="48" x2="52" y2="48"/>
    <polygon points="48,40 60,48 48,56"/>
  </g>
  <!-- STL label -->
  <text x="46" y="22" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#24292f">STL</text>
</svg>
